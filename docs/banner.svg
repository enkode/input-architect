<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F75821;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#FF8A50;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#F75821;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="160" rx="12" fill="#0F0F11"/>
  <rect width="600" height="160" rx="12" fill="none" stroke="#27272A" stroke-width="1"/>

  <!-- Glow bar -->
  <rect x="40" y="120" width="520" height="2" rx="1" fill="url(#glow)" opacity="0.6"/>
  <rect x="40" y="120" width="520" height="2" rx="1" fill="url(#glow)" opacity="0.3" filter="url(#blur)"/>

  <!-- Keyboard icon -->
  <g transform="translate(40, 35)">
    <!-- Keyboard outline -->
    <rect x="0" y="10" width="52" height="36" rx="4" fill="none" stroke="#F75821" stroke-width="1.5"/>
    <!-- Key rows -->
    <rect x="4" y="14" width="6" height="6" rx="1" fill="#F75821" opacity="0.3"/>
    <rect x="12" y="14" width="6" height="6" rx="1" fill="#F75821" opacity="0.5"/>
    <rect x="20" y="14" width="6" height="6" rx="1" fill="#F75821" opacity="0.7"/>
    <rect x="28" y="14" width="6" height="6" rx="1" fill="#F75821" opacity="0.9"/>
    <rect x="36" y="14" width="6" height="6" rx="1" fill="#F75821" opacity="0.7"/>
    <rect x="44" y="14" width="4" height="6" rx="1" fill="#F75821" opacity="0.5"/>

    <rect x="4" y="22" width="6" height="6" rx="1" fill="#F75821" opacity="0.2"/>
    <rect x="12" y="22" width="6" height="6" rx="1" fill="#FF8A50" opacity="0.8"/>
    <rect x="20" y="22" width="6" height="6" rx="1" fill="#FF8A50" opacity="1"/>
    <rect x="28" y="22" width="6" height="6" rx="1" fill="#FF8A50" opacity="0.8"/>
    <rect x="36" y="22" width="6" height="6" rx="1" fill="#F75821" opacity="0.4"/>
    <rect x="44" y="22" width="4" height="6" rx="1" fill="#F75821" opacity="0.2"/>

    <rect x="4" y="30" width="6" height="6" rx="1" fill="#F75821" opacity="0.15"/>
    <rect x="12" y="30" width="6" height="6" rx="1" fill="#F75821" opacity="0.3"/>
    <rect x="20" y="30" width="18" height="6" rx="1" fill="#F75821" opacity="0.2"/>
    <rect x="40" y="30" width="8" height="6" rx="1" fill="#F75821" opacity="0.15"/>

    <rect x="4" y="38" width="10" height="4" rx="1" fill="#F75821" opacity="0.1"/>
    <rect x="16" y="38" width="24" height="4" rx="1" fill="#F75821" opacity="0.15"/>
    <rect x="42" y="38" width="6" height="4" rx="1" fill="#F75821" opacity="0.1"/>
  </g>

  <!-- Title -->
  <text x="110" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#FAFAFA" letter-spacing="-0.5">
    Input Architect
  </text>

  <!-- Subtitle -->
  <text x="110" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#A1A1AA">
    Framework Laptop 16 Keyboard &amp; Macropad Configurator
  </text>

  <!-- Feature tags -->
  <g transform="translate(110, 96)">
    <rect x="0" y="0" width="72" height="18" rx="4" fill="#F75821" opacity="0.15"/>
    <text x="36" y="13" font-family="ui-monospace, monospace" font-size="9" fill="#F75821" text-anchor="middle" font-weight="600">Key Mapping</text>

    <rect x="80" y="0" width="72" height="18" rx="4" fill="#F75821" opacity="0.15"/>
    <text x="116" y="13" font-family="ui-monospace, monospace" font-size="9" fill="#F75821" text-anchor="middle" font-weight="600">Per-Key RGB</text>

    <rect x="160" y="0" width="60" height="18" rx="4" fill="#F75821" opacity="0.15"/>
    <text x="190" y="13" font-family="ui-monospace, monospace" font-size="9" fill="#F75821" text-anchor="middle" font-weight="600">Firmware</text>

    <rect x="228" y="0" width="48" height="18" rx="4" fill="#F75821" opacity="0.15"/>
    <text x="252" y="13" font-family="ui-monospace, monospace" font-size="9" fill="#F75821" text-anchor="middle" font-weight="600">WebHID</text>

    <rect x="284" y="0" width="36" height="18" rx="4" fill="#F75821" opacity="0.15"/>
    <text x="302" y="13" font-family="ui-monospace, monospace" font-size="9" fill="#F75821" text-anchor="middle" font-weight="600">VIA</text>
  </g>
</svg>
